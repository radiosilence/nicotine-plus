name: Nightly macOS DMG
on:
  push:
    branches: [master]
    paths:
      - 'pynicotine/**'
      - 'setup.py'
      - 'setup.cfg'
      - 'pyproject.toml'
      - 'build-aux/**'
  workflow_dispatch:

concurrency:
  group: nightly-build
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - arch: x86_64
            platform: macos-15-intel
          - arch: arm64
            platform: macos-15
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create Python virtual environment
        run: |
          brew uninstall --ignore-dependencies python@3.14 || true
          brew install --overwrite python@3.14
          python3.14 -m venv venv

      - name: Install build dependencies
        run: venv/bin/python3 build-aux/macos/dependencies.py

      - name: Freeze application
        run: venv/bin/python3 build-aux/macos/setup.py bdist_dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.arch }}-dmg
          path: build-aux/macos/build/*.dmg

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version info
        id: version
        run: |
          DATE=$(date -u +%Y%m%d)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=nightly-${DATE}" >> "$GITHUB_OUTPUT"
          echo "name=Nightly Build ${DATE} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Download all DMG artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Rename DMGs with date
        run: |
          DATE=${{ steps.version.outputs.date }}
          for dmg in $(find artifacts/ -name '*.dmg' -type f); do
            dir=$(dirname "$dmg")
            base=$(basename "$dmg" .dmg)
            mv "$dmg" "${dir}/${base}-${DATE}.dmg"
          done
          find artifacts/ -type f -name '*.dmg'

      - name: Delete previous nightly releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete today's release if re-running
          gh release delete "${{ steps.version.outputs.tag }}" --yes --cleanup-tag 2>/dev/null || true

          # Delete old nightly releases (keep last 7)
          gh release list --limit 100 --json tagName,createdAt \
            --jq '[.[] | select(.tagName | startswith("nightly-"))] | sort_by(.createdAt) | reverse | .[7:][] | .tagName' \
            | while read -r tag; do
                gh release delete "$tag" --yes --cleanup-tag || true
              done

      - name: Create nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/release-notes.md <<'NOTES'
          ## Nightly macOS Build

          **Date:** ${{ steps.version.outputs.date }}
          **Commit:** ${{ github.sha }}

          Ad-hoc signed macOS DMG binaries built from the latest upstream master.

          ### Downloads
          - **Apple Silicon (arm64):** For M1/M2/M3/M4 Macs
          - **Intel (x86_64):** For Intel-based Macs

          ### Install via Homebrew (Recommended)
          ```sh
          brew install radiosilence/nicotine-plus/nicotine-plus-nightly
          ```

          ### Manual Installation
          1. Download the DMG for your architecture
          2. Open the DMG and drag Nicotine+ to Applications
          3. Remove quarantine: `xattr -cr /Applications/Nicotine+.app`

          > These builds are ad-hoc signed (not notarized). Homebrew install handles quarantine automatically.
          NOTES

          DMG_FILES=$(find artifacts/ -name '*.dmg' -type f)
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.name }}" \
            --notes-file /tmp/release-notes.md \
            --latest \
            $DMG_FILES

      - name: Update Homebrew tap
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "RELEASE_TOKEN not set, skipping tap update"
            exit 0
          fi

          DATE=${{ steps.version.outputs.date }}
          TAG=${{ steps.version.outputs.tag }}

          ARM_DMG=$(find artifacts/ -name '*-arm64-*.dmg' -type f)
          INTEL_DMG=$(find artifacts/ -name '*-x86_64-*.dmg' -type f)
          ARM_SHA=$(sha256sum "$ARM_DMG" | awk '{print $1}')
          INTEL_SHA=$(sha256sum "$INTEL_DMG" | awk '{print $1}')
          ARM_NAME=$(basename "$ARM_DMG")
          INTEL_NAME=$(basename "$INTEL_DMG")

          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/radiosilence/homebrew-nicotine-plus.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          mkdir -p Casks

          {
            printf 'cask "nicotine-plus-nightly" do\n'
            printf '  version "%s"\n' "${DATE}"
            printf '\n'
            printf '  on_arm do\n'
            printf '    sha256 "%s"\n' "${ARM_SHA}"
            printf '    url "https://github.com/radiosilence/nicotine-plus/releases/download/%s/%s"\n' "${TAG}" "${ARM_NAME}"
            printf '  end\n'
            printf '\n'
            printf '  on_intel do\n'
            printf '    sha256 "%s"\n' "${INTEL_SHA}"
            printf '    url "https://github.com/radiosilence/nicotine-plus/releases/download/%s/%s"\n' "${TAG}" "${INTEL_NAME}"
            printf '  end\n'
            printf '\n'
            printf '  name "Nicotine+"\n'
            printf '  desc "Graphical client for the Soulseek peer-to-peer network (nightly build)"\n'
            printf '  homepage "https://github.com/radiosilence/nicotine-plus"\n'
            printf '\n'
            printf '  depends_on macos: ">= :ventura"\n'
            printf '\n'
            printf '  app "Nicotine+.app"\n'
            printf '\n'
            printf '  postflight do\n'
            printf '    system_command "/usr/bin/xattr",\n'
            printf '                   args: ["-cr", "#{appdir}/Nicotine+.app"]\n'
            printf '  end\n'
            printf '\n'
            printf '  zap trash: [\n'
            printf '    "~/.config/nicotine",\n'
            printf '    "~/.local/share/nicotine",\n'
            printf '  ]\n'
            printf 'end\n'
          } > Casks/nicotine-plus-nightly.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Update nicotine-plus-nightly to ${DATE}"
          git push
